<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antwave l Espace créateurs</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A; --accent: #FF0050; --text: #FFFFFF;
    --text-muted: #666666; --border: #1E1E1E;
    --input-bg: #111111; --input-border: #2A2A2A;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px 20px;
  }
  .container { width: 100%; max-width: 440px; }
  .heading {
    font-family: 'Bebas Neue', sans-serif; font-size: 36px;
    letter-spacing: 2px; text-align: center; margin-bottom: 6px;
  }
  .subheading {
    text-align: center; font-size: 13px; color: var(--text-muted);
    font-weight: 300; margin-bottom: 40px;
  }
  .form { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted);
  }
  .field input, .field select {
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s; width: 100%;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: #444; }
  .field select option { background: #111; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .divider {
    display: flex; align-items: center; gap: 12px; margin: 4px 0;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
  .btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 15px; font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 2px; cursor: pointer;
    transition: opacity 0.2s; margin-top: 6px;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .footer-note {
    text-align: center; font-size: 12px; color: var(--text-muted);
    font-weight: 300; margin-top: 24px; line-height: 1.6;
  }
  .footer-note a { color: var(--text-muted); text-decoration: underline; }
  .msg {
    border-radius: 10px; padding: 14px 16px;
    font-size: 13px; margin-top: 16px; display: none; text-align: center;
  }
  .msg.success { background: #00C89618; border: 1px solid #00C89640; color: #00C896; }
  .msg.error { background: #FF005015; border: 1px solid #FF005040; color: #FF0050; }
  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-muted); font-size: 13px; text-decoration: none;
    margin-bottom: 32px; transition: color 0.2s;
  }
  .back-link:hover { color: #fff; }
</style>
<meta name="theme-color" content="#FF0050">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.antwave.co">
<meta property="og:title" content="Antwave l Espace créateurs">
<meta property="og:description" content="Rejoins des missions, crée du contenu & gagne des tokens.">
<meta property="og:image" content="https://i.ibb.co/4gYjh3yn/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Antwave l Espace créateurs">
<meta name="twitter:description" content="Rejoins des missions, crée du contenu & gagne des tokens.">
<meta name="twitter:image" content="https://i.ibb.co/4gYjh3yn/og-image.png">
<link rel="manifest" href="/site.webmanifest">
</head>
<body>
<div class="container">

  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Retour à l'accueil
  </a>

  <h1 class="heading">Rejoins-nous</h1>
  <p class="subheading">Ta demande sera validée manuellement sous 48h.</p>

  <form class="form" id="inscriptionForm">

    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="nom" placeholder="Ton nom" required>
    </div>

    <div class="field">
      <label>Adresse e-mail</label>
      <input type="email" id="email" placeholder="ton@email.com" required>
    </div>

    <div class="field">
      <label>Confirmer l'e-mail</label>
      <input type="email" id="email_confirm" placeholder="ton@email.com" required>
    </div>

    <div class="row">
      <div class="field">
        <label>Date de naissance</label>
        <input type="date" id="dob" required>
      </div>
      <div class="field">
        <label>Sexe</label>
        <select id="sexe" required>
          <option value="" disabled selected>Choisir</option>
          <option>Homme</option>
          <option>Femme</option>
          <option>Autre</option>
          <option>Non précisé</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Compte TikTok</label>
      <input type="text" id="pseudo_tiktok" placeholder="@tonpseudo" required>
    </div>

    <div class="field">
      <label>Nombre d'abonnés TikTok</label>
      <input type="number" id="abonnes" placeholder="ex: 5000" min="0" required>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Code d'accès</span>
      <div class="divider-line"></div>
    </div>

    <div class="field">
      <label>Code de parrainage</label>
      <input type="text" id="code" placeholder="XXXXXXXX" maxlength="12" required>
    </div>

    <button type="submit" class="btn" id="submitBtn">S'inscrire</button>

  </form>

  <div class="msg success" id="msgSuccess">
    ✓ Demande envoyée ! On revient vers toi sous 48h.
  </div>
  <div class="msg error" id="msgError">
    Une erreur est survenue. Réessaie.
  </div>

  <p class="footer-note">
    En t'inscrivant, tu acceptes nos <a href="#">conditions d'utilisation</a>.
  </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://ecxxwhinhjmgiuoryvdw.supabase.co',
    'sb_publishable_lcb3kx6ZpiBOW-wdr60mYA_VaHPOPi8'
  );

  document.getElementById('inscriptionForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const confirm = document.getElementById('email_confirm').value.trim();

    if (email !== confirm) {
      document.getElementById('email_confirm').setCustomValidity('Les e-mails ne correspondent pas.');
      document.getElementById('email_confirm').reportValidity();
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Envoi...';

    const { error } = await sb.from('membres').insert({
      nom: document.getElementById('nom').value.trim(),
      email: email,
      pseudo_tiktok: document.getElementById('pseudo_tiktok').value.trim(),
      abonnes: parseInt(document.getElementById('abonnes').value) || 0,
      statut: 'en_attente'
    });

    if (error) {
      document.getElementById('msgError').style.display = 'block';
      document.getElementById('msgError').textContent = error.message.includes('unique') 
        ? 'Cet email est déjà inscrit.' 
        : 'Une erreur est survenue. Réessaie.';
      btn.disabled = false;
      btn.textContent = "S'inscrire";
    } else {
      document.getElementById('inscriptionForm').style.display = 'none';
      document.getElementById('msgSuccess').style.display = 'block';
    }
  });

  document.getElementById('email_confirm').addEventListener('input', function() {
    this.setCustomValidity('');
  });
</script>
</body>
</html>
