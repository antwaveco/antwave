<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antwave l Espace créateurs</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#FF0050">
<meta property="og:url" content="https://www.antwave.co">
<meta property="og:image" content="https://antwave.co/og-image.png">
<meta property="og:title" content="Antwave l Espace créateurs">
<meta property="og:description" content="Rejoins des missions, crée du contenu &amp; gagne des tokens.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A; --accent: #FF0050; --text: #FFFFFF;
    --muted: #555; --card: #111111; --border: #1E1E1E;
    --top-h: 60px; --tab-h: 48px;
  }
  body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    height: var(--top-h); display: flex; align-items: center;
    justify-content: space-between; padding: 0 20px;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #1a1a1a; border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  .avatar:hover { border-color: var(--accent); }
  .avatar svg { opacity: 0.4; }
  .logo-text { font-family: "Bebas Neue", sans-serif; font-size: 22px; letter-spacing: 3px; }
  .logo-text span { color: var(--accent); }
  .token-badge {
    display: flex; align-items: center; gap: 6px;
    background: #FF005012; border: 1px solid #FF005030;
    border-radius: 20px; padding: 5px 12px; cursor: pointer; transition: background 0.2s;
  }
  .token-badge:hover { background: #FF005020; }
  .token-amount { font-family: "Bebas Neue", sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--accent); }
  .token-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  .top-tabs {
    position: sticky; top: var(--top-h); z-index: 99;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; height: var(--tab-h);
  }
  .top-tab {
    flex: 1; border: none; background: none; color: var(--muted);
    font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 400;
    cursor: pointer; transition: color 0.2s; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .top-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .top-tab:hover { color: #aaa; }

  .content { padding: 20px 16px 0; max-width: 640px; margin: 0 auto; }
  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .mission-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-bottom: 12px; cursor: pointer;
    transition: border-color 0.2s, transform 0.15s; animation: fadeUp 0.4s ease both;
  }
  .mission-card:hover { border-color: #333; transform: translateY(-1px); }
  .mission-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .mission-ref { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
  .mission-title { font-family: "Bebas Neue", sans-serif; font-size: 20px; letter-spacing: 1px; line-height: 1.1; }
  .mission-tokens { flex-shrink: 0; background: #FF005015; border: 1px solid #FF005030; border-radius: 8px; padding: 6px 10px; text-align: center; }
  .mission-tokens-val { font-family: "Bebas Neue", sans-serif; font-size: 18px; color: var(--accent); display: block; }
  .mission-tokens-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .mission-desc { font-size: 13px; color: #888; font-weight: 300; line-height: 1.5; margin-bottom: 14px; }
  .mission-footer { display: flex; align-items: center; justify-content: space-between; }
  .mission-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); }
  .tag-pill.genre { border-color: #FF005030; color: #FF005099; }
  .mission-deadline { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .deadline-soon { color: #FF6B35; }
  .badge-new {
    display: inline-block; background: var(--accent); color: #fff; font-size: 9px;
    font-weight: 500; letter-spacing: 1px; padding: 2px 7px; border-radius: 4px;
    text-transform: uppercase; margin-left: 8px; vertical-align: middle;
  }
  .sub-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .sub-tab { font-size: 13px; color: var(--muted); padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
  .sub-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; font-weight: 300; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  /* SUBMIT FORM */
  .submit-form {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-top: 16px; display: none;
  }
  .submit-form.open { display: block; animation: fadeUp 0.3s ease; }
  .submit-input {
    width: 100%; background: #0d0d0d; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-family: "DM Sans", sans-serif; font-size: 14px; outline: none; margin-top: 8px;
  }
  .submit-input::placeholder { color: var(--muted); }
  .submit-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 12px; font-family: "Bebas Neue", sans-serif;
    font-size: 16px; letter-spacing: 1.5px; cursor: pointer; margin-top: 12px; transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.88; }
  .submit-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-top: 12px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="avatar" onclick="window.location.href='index.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round">
      <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </svg>
  </div>
  <div class="logo-text">ANT<span>WAVE</span></div>
  <div class="token-badge">
    <span class="token-amount" id="tokenCount">—</span>
    <span class="token-label">tokens</span>
  </div>
</div>

<!-- TABS -->
<div class="top-tabs">
  <button class="top-tab active" id="tab-pourtoi" onclick="switchTab('pourtoi')">Pour toi</button>
  <button class="top-tab" id="tab-general" onclick="switchTab('general')">Général</button>
  <button class="top-tab" id="tab-mesmissions" onclick="switchTab('mesmissions')">Mes missions</button>
</div>

<div class="content">

  <!-- POUR TOI -->
  <div class="panel active" id="panel-pourtoi">
    <p class="section-label">Missions recommandées</p>
    <div id="missions-pourtoi"><div class="loading">Chargement...</div></div>
  </div>

  <!-- GÉNÉRAL -->
  <div class="panel" id="panel-general">
    <p class="section-label">Toutes les missions</p>
    <div id="missions-general"><div class="loading">Chargement...</div></div>
  </div>

  <!-- MES MISSIONS -->
  <div class="panel" id="panel-mesmissions">
    <div class="sub-tabs">
      <div class="sub-tab active" onclick="switchSub(this, 'en-cours')">En cours</div>
      <div class="sub-tab" onclick="switchSub(this, 'accomplies')">Accomplies</div>
      <div class="sub-tab" onclick="switchSub(this, 'finies')">Finies</div>
    </div>
    <div id="sub-en-cours"><div class="loading">Chargement...</div></div>
    <div id="sub-accomplies" style="display:none"><div class="empty-state"><div class="empty-icon">✓</div>Aucune mission accomplie</div></div>
    <div id="sub-finies" style="display:none"><div class="empty-state"><div class="empty-icon">◻</div>Aucune mission terminée</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://ecxxwhinhjmgiuoryvdw.supabase.co',
  'sb_publishable_lcb3kx6ZpiBOW-wdr60mYA_VaHPOPi8'
);

// Get membre from session
const membreRaw = sessionStorage.getItem('membre');
const membre = membreRaw ? JSON.parse(membreRaw) : null;
if(!membre) window.location.href = 'index.html';
document.getElementById('tokenCount').textContent = membre?.tokens || 0;

function missionCard(m, showSubmit = false) {
  const jours = m.deadline ? Math.ceil((new Date(m.deadline) - new Date()) / 86400000) : null;
  const joursText = jours !== null ? (jours <= 3 ? `<span class="mission-deadline deadline-soon">${jours} jours restants</span>` : `<span class="mission-deadline">${jours} jours restants</span>`) : '';
  return `
    <div class="mission-card">
      <div class="mission-top">
        <div>
          <div class="mission-ref">#${m.id.substring(0,6).toUpperCase()}</div>
          <div class="mission-title">${m.titre}</div>
        </div>
        <div class="mission-tokens">
          <span class="mission-tokens-val">${m.tokens}</span>
          <span class="mission-tokens-lbl">tokens</span>
        </div>
      </div>
      <p class="mission-desc">${m.description || ''}</p>
      <div class="mission-footer">
        <div class="mission-tags">
          ${m.genre ? `<span class="tag-pill genre">${m.genre}</span>` : ''}
        </div>
        ${joursText}
      </div>
      ${showSubmit ? `
        <div class="submit-form" id="sf-${m.id}">
          <span class="submit-label">Lien TikTok de ton rendu</span>
          <input class="submit-input" type="url" id="url-${m.id}" placeholder="https://www.tiktok.com/@..."/>
          <button class="submit-btn" onclick="soumettre('${m.id}')">Soumettre mon rendu</button>
        </div>
        <button onclick="document.getElementById('sf-${m.id}').classList.toggle('open')"
          style="margin-top:12px;background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;width:100%">
          Participer à cette mission
        </button>` : ''}
    </div>`;
}

async function loadMissions() {
  const { data } = await sb.from('missions').select('*').eq('statut','active').order('created_at', { ascending: false });
  const html = data?.length ? data.map(m => missionCard(m, true)).join('') : '<div class="empty-state"><div class="empty-icon">◻</div>Aucune mission disponible</div>';
  document.getElementById('missions-pourtoi').innerHTML = html;
  document.getElementById('missions-general').innerHTML = html;
}

async function loadMesRendus() {
  if(!membre) return;
  const { data } = await sb.from('rendus').select('*, missions(*)').eq('membre_id', membre.id).order('created_at', { ascending: false });
  const enCours = data?.filter(r => r.statut === 'en_attente') || [];
  if(enCours.length === 0) {
    document.getElementById('sub-en-cours').innerHTML = '<div class="empty-state"><div class="empty-icon">◻</div>Aucune mission en cours</div>';
    return;
  }
  document.getElementById('sub-en-cours').innerHTML = enCours.map(r => `
    <div class="mission-card">
      <div class="mission-top">
        <div>
          <div class="mission-ref">#${r.mission_id?.substring(0,6).toUpperCase() || '—'}</div>
          <div class="mission-title">${r.missions?.titre || '—'}</div>
        </div>
        <div class="mission-tokens">
          <span class="mission-tokens-val">${r.missions?.tokens || 0}</span>
          <span class="mission-tokens-lbl">tokens</span>
        </div>
      </div>
      <div class="mission-footer">
        <span class="tag-pill" style="border-color:#FF6B3530;color:#FF6B3599">En attente de validation</span>
      </div>
    </div>`).join('');
}

async function soumettre(missionId) {
  const url = document.getElementById('url-'+missionId).value.trim();
  if(!url || !url.includes('tiktok')) { alert('Entre un lien TikTok valide'); return; }
  const { error } = await sb.from('rendus').insert({
    membre_id: membre.id, mission_id: missionId,
    url_tiktok: url, statut: 'en_attente'
  });
  if(error) { alert('Erreur: '+error.message); return; }
  document.getElementById('sf-'+missionId).classList.remove('open');
  alert('Rendu soumis ! On revient vers toi après validation 🎉');
}

function switchTab(name) {
  ['pourtoi','general','mesmissions'].forEach(t => {
    document.getElementById('panel-'+t).classList.remove('active');
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name === 'mesmissions') loadMesRendus();
}

function switchSub(el, name) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['en-cours','accomplies','finies'].forEach(s => document.getElementById('sub-'+s).style.display = 'none');
  document.getElementById('sub-'+name).style.display = 'block';
}

loadMissions();
</script>
</body>
</html>
