<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Antwave</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#FF0050">
<meta property="og:image" content="/og-image.png">
<meta property="og:title" content="Antwave l Espace créateurs">
<meta property="og:description" content="Rejoins des missions, crée du contenu &amp; gagne des tokens.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A; --accent: #FF0050; --text: #FFFFFF;
    --text-muted: #444444; --input-bg: #111111; --input-border: #2A2A2A;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;
  }
  .container { width: 100%; max-width: 360px; }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 38px;
    letter-spacing: 4px; text-align: center; margin-bottom: 4px;
  }
  .logo span { color: var(--accent); }
  .tagline { text-align: center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 48px; }
  .form { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .field input {
    background: var(--input-bg); border: 1px solid var(--input-border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: #FF0050; }
  .field input::placeholder { color: #444; }
  .btn {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 15px; font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    letter-spacing: 2px; cursor: pointer; transition: opacity 0.2s; margin-top: 6px;
  }
  .btn:hover { opacity: 0.88; }
  .bottom-links { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 28px; }
  .small-link { font-size: 12px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .small-link:hover { color: #fff; }
  .msg { text-align: center; font-size: 12px; color: var(--accent); margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">ANT<span>WAVE</span></div>
  <div class="tagline">Espace créateurs</div>

  <form class="form" id="loginForm">
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="loginEmail" placeholder="ton@email.com" required>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn">Se connecter</button>
  </form>

  <div class="msg" id="loginMsg">Email ou mot de passe incorrect.</div>

  <div class="bottom-links">
    <a href="#" class="small-link">Mot de passe oublié ?</a>
    <a href="inscription.html" class="small-link">Pas encore membre ? S'inscrire →</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://ecxxwhinhjmgiuoryvdw.supabase.co',
  'sb_publishable_lcb3kx6ZpiBOW-wdr60mYA_VaHPOPi8'
);

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;

  // Check membre actif
  const { data, error } = await sb.from('membres')
    .select('*').eq('email', email).eq('statut', 'actif').single();

  if(error || !data) {
    document.getElementById('loginMsg').style.display = 'block';
    document.getElementById('loginMsg').textContent = !data
      ? 'Compte non trouvé ou non encore activé.'
      : 'Email ou mot de passe incorrect.';
    return;
  }

  // Store session
  sessionStorage.setItem('membre', JSON.stringify(data));
  window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
